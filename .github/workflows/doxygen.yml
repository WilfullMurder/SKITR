  name: Doxygen

  on:
    push:
      branches: [ main ]

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up Doxygen and diagram tools
          run: |
            sudo apt-get update
            sudo apt-get install -y doxygen graphviz mscgen

        - name: Generate Doxygen
          run: |
            doxygen Doxyfile
            
            # Ensure filesystem settles (prevents rsync race)
            sleep 2
            
            # Fail early if output missing
            test -d docs/html || (echo "docs/html not generated!" && exit 1)

        - name: Deploy to docs branch
          env:
            GITHUB_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
          run: |
            set -e
            
            # Configure git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Prepare clean deploy dir
            rm -rf /tmp/deploy
            mkdir -p /tmp/deploy
            cd /tmp/deploy
            
            # Init fresh repo
            git init
            git checkout -b docs
            
            # Copy generated docs (robust + quiet)
            rsync -a --delete "$GITHUB_WORKSPACE/docs/html/" . || true
            
            # GitHub Pages compatibility
            touch .nojekyll
            
            # Optional: landing redirect (root → index.html)
            if [ ! -f index.html ]; then
              echo '<meta http-equiv="refresh" content="0; url=./index.html">' > index.html
            fi
            
            # Commit (only if changes exist)
            git add -A
            git diff --cached --quiet || git commit -m "Update Doxygen docs from main@${GITHUB_SHA}"
            
            # Push (force overwrite docs branch)
            git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
            git push --force origin docs
