name: Doxygen

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Doxygen and diagram tools
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen graphviz mscgen

      - name: Generate Doxygen
        run: |
          doxygen Doxyfile

      - name: Deploy to docs branch
        env:
          GITHUB_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
  
          git fetch origin
          
          # Create worktree from remote if exists
          if git ls-remote --exit-code --heads origin docs; then
          git worktree add /tmp/docs origin/docs
          else
          git worktree add -b docs /tmp/docs
          fi
          
          cd /tmp/docs
          
          # Copy generated docs
          rsync -a --delete "$GITHUB_WORKSPACE/docs/html/" .
          
          # Commit & push
          git add -A
          git commit -m "Update Doxygen docs from main@${GITHUB_SHA}" || echo "No changes to commit"
          git push origin HEAD:docs
