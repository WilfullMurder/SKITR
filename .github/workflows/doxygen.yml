  name: Doxygen

  on:
    push:
      branches: [ main ]

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up Doxygen and diagram tools
          run: |
            sudo apt-get update
            sudo apt-get install -y doxygen graphviz mscgen

        - name: Generate Doxygen
          run: |
            doxygen Doxyfile
            
            # Ensure filesystem settles (prevents rsync race)
            sleep 2
            
            # Fail early if output missing
            test -d docs/html || (echo "docs/html not generated!" && exit 1)
            

        - name: Deploy to docs branch
          env:
            GITHUB_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
          run: |
            set -e
             
            # Configure git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
              
            # Save generated docs OUTSIDE git state
            BUILD_DIR="$(pwd)"
            DOCS_DIR="$BUILD_DIR/docs/html"
              
            # Switch to orphan branch
            git checkout --orphan docs
              
            # Remove everything tracked
            git rm -rf . || true
              
            # Copy generated docs
            rsync -a "$DOCS_DIR/" ./
              
            # GitHub Pages requirement
            touch .nojekyll
              
            # Commit only if changes exist
            git add -A
            git diff --cached --quiet || git commit -m "Update Doxygen docs from main@${GITHUB_SHA}"
              
            # Force push
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
            git push --force origin docs